schemaVersion: "0.3"
description: >
  Generates a new random password, updates the Secrets Manager secret that holds
  the RDS credentials, and then modifies the RDS instance to use the new password.
  Waits up to 10 minutes for the RDS instance to return to the available state.
parameters:
  DbInstanceId:
    type: String
    description: The RDS DB instance identifier (not the ARN).
  SecretArn:
    type: String
    description: ARN of the Secrets Manager secret that stores the RDS username and password.
mainSteps:
  - name: RotatePassword
    action: aws:executeScript
    description: >
      Generate a new 32-character random password, write it to Secrets Manager,
      and apply it to the RDS instance with ApplyImmediately=True.
    timeoutSeconds: 120
    inputs:
      Runtime: python3.11
      Handler: rotate
      InputPayload:
        db_instance_id: "{{ DbInstanceId }}"
        secret_arn: "{{ SecretArn }}"
      Script: |
        import boto3
        import secrets
        import string
        import json

        def rotate(events, context):
            rds = boto3.client('rds')
            sm = boto3.client('secretsmanager')
            db_id = events['db_instance_id']
            secret_arn = events['secret_arn']

            # Generate a new strong password (avoids / @ " ' which RDS rejects)
            alphabet = string.ascii_letters + string.digits + '!#$%&*+-=?'
            new_password = ''.join(secrets.choice(alphabet) for _ in range(32))

            # Preserve existing secret fields, update only the password
            secret_resp = sm.get_secret_value(SecretId=secret_arn)
            secret_dict = json.loads(secret_resp['SecretString'])
            secret_dict['password'] = new_password

            sm.put_secret_value(
                SecretId=secret_arn,
                SecretString=json.dumps(secret_dict)
            )

            rds.modify_db_instance(
                DBInstanceIdentifier=db_id,
                MasterUserPassword=new_password,
                ApplyImmediately=True
            )

            return {'status': 'rotated', 'db_instance_id': db_id}
    outputs:
      - Name: RotationStatus
        Selector: "$.Payload.status"
        Type: String

  - name: WaitForRdsAvailable
    action: aws:waitForAwsResourceProperty
    description: Block until the RDS instance returns to the available state after the password change.
    timeoutSeconds: 600
    inputs:
      Service: rds
      Api: DescribeDBInstances
      DBInstanceIdentifier: "{{ DbInstanceId }}"
      PropertySelector: "$.DBInstances[0].DBInstanceStatus"
      DesiredValues:
        - available
