<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infrastructure Incident — Result</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #e8eaed;
      padding: 32px 16px;
      color: #1a1a2e;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper { max-width: 600px; margin: 0 auto; }

    .accent { height: 4px; background: {{outcome_color}}; border-radius: 4px 4px 0 0; }
    .card {
      background: #ffffff;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    }

    /* ── Header ─────────────────────────────────────── */
    .header { background: {{outcome_color}}; padding: 28px 36px 24px; }
    .badge-row { margin-bottom: 14px; }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(255,255,255,0.22);
      color: #fff;
      margin-right: 6px;
    }
    .header h1 { color: #ffffff; font-size: 22px; font-weight: 700; line-height: 1.3; }
    .header-sub { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 8px; font-family: 'SFMono-Regular', Consolas, monospace; }

    /* ── Body ───────────────────────────────────────── */
    .body { padding: 28px 36px; }

    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #94a3b8;
      margin-bottom: 7px;
    }
    .divider { height: 1px; background: #f1f3f5; margin: 22px 0; }

    /* Outcome box */
    .outcome-card {
      background: #f8fafc;
      border-left: 3px solid {{outcome_color}};
      border-radius: 0 6px 6px 0;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #1e293b;
    }

    /* Resource pill */
    .resource-pill {
      background: #f7f8fa;
      border: 1px solid #e2e6ea;
      border-radius: 6px;
      padding: 9px 13px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      color: #4a5568;
      word-break: break-all;
      line-height: 1.5;
    }

    /* Diagnosis */
    .diagnosis-text { font-size: 14px; line-height: 1.7; color: #4a5568; }

    /* Meta row */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    .meta-cell {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .meta-cell .meta-label { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
    .meta-cell .meta-value { font-size: 12px; color: #1e293b; font-weight: 600; word-break: break-all; }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      padding: 16px 36px;
      text-align: center;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }
    .footer p { font-size: 11px; color: #94a3b8; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="accent"></div>
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div class="badge-row">
          <span class="badge">{{environment}}</span>
          <span class="badge">Incident Closed</span>
        </div>
        <h1>{{outcome_icon}} {{outcome_title}}</h1>
        <div class="header-sub">{{alarm_name}}</div>
      </div>

      <!-- Body -->
      <div class="body">

        <div>
          <div class="label">Outcome</div>
          <div class="outcome-card">{{outcome_detail}}</div>
        </div>

        <div class="divider"></div>

        <div>
          <div class="label">Affected Resource</div>
          <div class="resource-pill">{{resource_arn}}</div>
        </div>

        <div style="margin-top:18px;">
          <div class="label">Original Diagnosis</div>
          <div class="diagnosis-text">{{diagnosis}}</div>
        </div>

        <div class="divider"></div>

        <div>
          <div class="label">Incident Details</div>
          <div class="meta-grid">
            <div class="meta-cell">
              <div class="meta-label">Incident ID</div>
              <div class="meta-value">{{incident_id}}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Closed At</div>
              <div class="meta-value">{{timestamp}}</div>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="footer">
        <p>Self-Healing Infrastructure</p>
      </div>

    </div>
  </div>
</body>
</html>
